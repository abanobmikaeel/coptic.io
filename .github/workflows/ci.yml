name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  test:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --ignore-scripts && pnpm rebuild
      - run: pnpm build:packages
      - run: pnpm check
      - run: pnpm typecheck
      - run: pnpm --filter @coptic/api test run

  build-web:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --ignore-scripts && pnpm rebuild
      - run: pnpm build:packages
      - run: pnpm --filter @coptic/web build

  deploy-production:
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: pnpm install --ignore-scripts && pnpm rebuild
      - run: pnpm build:packages
      - name: Detect changed Bible languages
        id: bible
        run: |
          base="${{ github.event.before }}"
          if [ -z "$base" ] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="HEAD~1"
          fi
          changed=$(git diff --name-only "$base" HEAD -- packages/data/src || true)
          langs=""
          for lang in en ar es cop; do
            if echo "$changed" | grep -q "^packages/data/src/$lang/"; then
              langs="$langs $lang"
            fi
          done
          langs=$(echo $langs | xargs)
          echo "langs=$langs" >> "$GITHUB_OUTPUT"
          echo "Bible languages to re-upload: ${langs:-(none)}"
      - name: Upload changed Bible data to R2
        if: steps.bible.outputs.langs != ''
        working-directory: apps/api
        run: bun scripts/upload-bible-r2.ts ${{ steps.bible.outputs.langs }}
      - name: Deploy to production
        working-directory: apps/api
        run: pnpm exec wrangler deploy --var DATA_VERSION:${{ github.sha }}

  smoke-test-production:
    needs: [deploy-production]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Run smoke tests against production
        env:
          API_URL: https://api.coptic.io
        run: bun scripts/smoke-test.ts

  deploy-preview:
    needs: [test]
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --ignore-scripts && pnpm rebuild
      - run: pnpm build:packages
      - name: Deploy preview worker
        id: deploy
        working-directory: apps/api
        run: |
          WORKER_NAME="coptic-api-pr-${{ github.event.pull_request.number }}"
          DEPLOY_OUTPUT=$(pnpm exec wrangler deploy --name "$WORKER_NAME" --var DATA_VERSION:${{ github.sha }} 2>&1)
          echo "$DEPLOY_OUTPUT"
          PREVIEW_URL=$(echo "$DEPLOY_OUTPUT" | grep -o 'https://[^ ]*\.workers\.dev' | tail -1)
          echo "worker_name=$WORKER_NAME" >> "$GITHUB_OUTPUT"
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
      - name: Comment preview URL on PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            const workerName = '${{ steps.deploy.outputs.worker_name }}';
            const sha = context.sha.substring(0, 7);
            const body = [
              '**Workers preview deployed!**',
              '',
              `🚀 \`${url}\``,
              '',
              'Quick tests:',
              '```',
              `curl ${url}/health`,
              `curl "${url}/api/readings/$(date +%Y-%m-%d)?detailed=true"`,
              '```',
              '',
              `> Worker: \`${workerName}\` · Commit: \`${sha}\``,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('Workers preview deployed')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  smoke-test:
    needs: [deploy-preview]
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Run smoke tests against preview
        env:
          API_URL: ${{ needs.deploy-preview.outputs.preview_url }}
        run: |
          sleep 5
          bun scripts/smoke-test.ts

  teardown-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --filter @coptic/api --ignore-scripts && pnpm rebuild
      - name: Delete preview worker
        working-directory: apps/api
        run: |
          WORKER_NAME="coptic-api-pr-${{ github.event.pull_request.number }}"
          pnpm exec wrangler delete --name "$WORKER_NAME" --force || true
