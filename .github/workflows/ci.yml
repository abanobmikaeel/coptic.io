name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  test:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm build:packages
      - run: pnpm check
      - run: pnpm typecheck
      - run: pnpm --filter @coptic/api test run

  build-web:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm build:packages
      - run: pnpm --filter @coptic/web build

  deploy-preview:
    needs: [test]
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm build:packages
      - name: Deploy preview worker
        id: deploy
        working-directory: apps/api
        run: |
          WORKER_NAME="coptic-api-pr-${{ github.event.pull_request.number }}"
          DEPLOY_OUTPUT=$(pnpm exec wrangler deploy --name "$WORKER_NAME" 2>&1)
          echo "$DEPLOY_OUTPUT"
          PREVIEW_URL=$(echo "$DEPLOY_OUTPUT" | grep -o 'https://[^ ]*\.workers\.dev' | tail -1)
          echo "worker_name=$WORKER_NAME" >> "$GITHUB_OUTPUT"
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            const workerName = '${{ steps.deploy.outputs.worker_name }}';
            const sha = context.sha.substring(0, 7);
            const body = [
              '**Workers preview deployed!**',
              '',
              `🚀 \`${url}\``,
              '',
              'Quick tests:',
              '```',
              `curl ${url}/health`,
              `curl "${url}/api/readings/$(date +%Y-%m-%d)?detailed=true"`,
              '```',
              '',
              `> Worker: \`${workerName}\` · Commit: \`${sha}\``,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('Workers preview deployed')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  teardown-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --filter @coptic/api
      - name: Delete preview worker
        working-directory: apps/api
        run: |
          WORKER_NAME="coptic-api-pr-${{ github.event.pull_request.number }}"
          pnpm exec wrangler delete --name "$WORKER_NAME" --force || true
