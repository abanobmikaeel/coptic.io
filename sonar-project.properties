sonar.projectName=Coptic.IO
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

sonar.sources=apps,packages,scripts
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,apps/web/e2e/**

sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/dist-workers/**,**/coverage/**,**/*.json,**/*.min.js,apps/web/public/**
sonar.coverage.exclusions=**/*.d.ts,**/*.config.*,**/__tests__/**,**/__benchmarks__/**,apps/web/e2e/**,scripts/**
sonar.cpd.exclusions=**/__tests__/**,apps/web/e2e/**

# Dev-only git hooks spawn git/pnpm by name, resolved from the developer's own
# trusted PATH. S4036 (OS command searched in PATH) targets production code and
# is not a meaningful risk for local tooling, so don't raise it under scripts/.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S4036
sonar.issue.ignore.multicriteria.e1.resourceKey=scripts/**/*

sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info,apps/web/coverage/lcov.info,packages/core/coverage/lcov.info,packages/data/coverage/lcov.info
sonar.typescript.tsconfigPaths=apps/api/tsconfig.json,apps/web/tsconfig.json,packages/client/tsconfig.json,packages/core/tsconfig.json,packages/data/tsconfig.json
